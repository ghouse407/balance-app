<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maintain Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* LIGHT MODE (default) */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #000000;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 10px;
      font-size: 24px;
      font-weight: bold;
    }

    .balance {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      margin-top: 5px;
      color: #000000;
    }

    .date {
      text-align: center;
      margin-top: 5px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #444444;
    }

    .separator-line {
      width: 200px;
      height: 1px;
      background: #000000;
      margin: 10px auto 20px;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 10px 0;
      border-bottom: 1px solid #cccccc;
      font-size: 14px;
    }

    .name {
      font-weight: bold;
    }

    .amount {
      float: right;
      font-weight: bold;
      color: #000000;
    }

    /* DARK MODE (system controlled) */
    @media (prefers-color-scheme: dark) {
      body {
        background: #000000;
        color: #ffffff;
      }

      .container {
        background: #000000;
      }

      h1 {
        color: #ffffff;
      }

      .balance {
        color: #ffffff;
      }

      .date {
        color: #cccccc;
      }

      .separator-line {
        background: #ffffff;
      }

      li {
        border-bottom: 1px solid #444444;
      }

      .amount {
        color: #ffffff;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Maintain Balance</h1>

    <div class="balance" id="total">$0.00</div>
    <div class="date" id="today"></div>

    <div class="separator-line"></div>

    <div class="section-title">Payments Due in Next 4 Days</div>

    <ul id="upcoming-list">
      <li>No payments detected in the next 4 days.</li>
    </ul>

  </div>

  <script src="app.js"></script>
</body>
</html>
