<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minimum Balance App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* ===== BASE LIGHT THEME (DEFAULT) ===== */
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
      color: #222;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .balance {
      font-size: 2.2rem;
      font-weight: 600;
      margin: 12px 0 4px;
      color: #007aff;
    }

    .date {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 16px 0 8px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 6px 0;
      border-bottom: 1px solid #ddd;
      font-size: 0.95rem;
    }

    .name {
      font-weight: 600;
    }

    .amount {
      float: right;
      font-weight: 600;
    }

    .admin-link {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #888;
      text-align: right;
    }

    .admin-link a {
      color: #888;
      text-decoration: none;
    }

    .admin-link a:hover {
      text-decoration: underline;
    }

    /* Admin panel */
    .admin-panel {
      display: none;
    }

    .admin-panel.active {
      display: block;
    }

    .admin-section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 16px 0 8px;
    }

    input[type="file"] {
      margin: 8px 0 12px;
    }

    button {
      padding: 8px 12px;
      margin: 4px 4px 4px 0;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button:hover {
      background: #eee;
    }

    pre {
      background: #eee;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      overflow-x: auto;
    }

    /* ===== DARK MODE — FOLLOWS iPHONE SETTINGS ===== */
    @media (prefers-color-scheme: dark) {
      body {
        background: #0d0d0d;
        color: #f2f2f2;
      }

      h1, .section-title, .admin-section-title {
        color: #ffffff;
      }

      .balance {
        color: #4da6ff;
      }

      .date {
        color: #bbbbbb;
      }

      ul li {
        border-bottom: 1px solid #333;
        color: #e6e6e6;
      }

      .admin-link
