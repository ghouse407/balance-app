<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maintain Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #222;
    }

    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 20px;
      background: #ffffff;
      min-height: 100vh;
      position: relative;
    }

    h1 {
      font-size: 1.4rem;
      margin-top: 40px;
      margin-bottom: 4px;
      text-align: center;
    }

    .balance {
      font-size: 3rem;
      font-weight: 700;
      margin: 6px 0 0;
      color: #000000;
      text-align: center;
    }

    .date {
      font-size: 0.9rem;
      color: #666;
      margin-top: 4px;
      margin-bottom: 16px;
      text-align: center;
    }

    .separator-line {
      width: 240px;
      height: 1px;
      background: #222;
      margin: 8px auto 24px;
      border-radius: 1px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 8px;
      text-align: left;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
      font-size: 0.95rem;
    }

    .name {
      font-weight: 600;
    }

    .amount {
      float: right;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Maintain Balance</h1>

    <!-- This shows the minimum balance required -->
    <div class="balance" id="total">$0.00</div>

    <!-- Today's date -->
    <div class="date" id="today"></div>

    <div class="separator-line"></div>

    <div class="section-title">Payments Due in Next 4 Days</div>

    <ul id="upcoming-list">
      <li>No payments detected in the next 4 days.</li>
    </ul>

  </div>

  <script src="app.js"></script>
</body>
</html>
