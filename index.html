<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minimum Balance App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
      color: #222;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }
    .balance {
      font-size: 2.2rem;
      font-weight: 600;
      margin: 12px 0 4px;
    }
    .date {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 16px 0 8px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      padding: 6px 0;
      border-bottom: 1px solid #ddd;
      font-size: 0.95rem;
    }
    .name {
      font-weight: 600;
    }
    .amount {
      float: right;
      font-weight: 600;
    }
    .admin-link {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #888;
      text-align: right;
    }
    .admin-link a {
      color: #888;
      text-decoration: none;
    }
    .admin-link a:hover {
      text-decoration: underline;
    }

    /* Admin panel */
    .admin-panel {
      display: none;
    }
    .admin-panel.active {
      display: block;
    }
    .admin-section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 16px 0 8px;
    }
    input[type="file"] {
      margin: 8px 0 12px;
    }
    button {
      padding: 8px 12px;
      margin: 4px 4px 4px 0;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover {
      background: #eee;
    }
    pre {
      background: #eee;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="main-view">
      <h1>Minimum Balance Required Today</h1>
      <div class="balance" id="balance-amount">$0.00</div>
      <div class="date" id="today-date"></div>

      <div class="section-title">Payments Due in Next 4 Days</div>
      <ul id="upcoming-list">
        <li>No payments detected in the next 4 days.</li>
      </ul>

      <div class="admin-link">
        <a href="#admin">Admin panel</a>
      </div>
    </div>

    <div id="admin-view" class="admin-panel">
      <h1>Admin Panel</h1>

      <div class="admin-section-title">1. Upload Last 6 Months CSV</div>
      <input type="file" id="csv-input" accept=".csv" />
      <button id="process-csv-btn">Process CSV & Rebuild Backend</button>

      <div class="admin-section-title">2. Backend Controls</div>
      <button id="export-backend-btn">Export Backend (JSON)</button>
      <button id="reset-backend-btn">Reset Backend (Clear Local)</button>

      <div class="admin-section-title">3. Detected Recurring Payments</div>
      <pre id="backend-preview">No backend loaded yet.</pre>

      <div class="admin-link">
        <a href="#">Back to main screen</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
