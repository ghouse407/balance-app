<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maintain Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root { color-scheme: light dark; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #222;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #eee; }
      .container { background: #1b1b1b; box-shadow: 0 0 0 1px #333; }
      .separator-line { background: #eee; }
      li { border-bottom: 1px solid #333; }
      .balance { color: #fff; }
      .date { color: #aaa; }
    }

    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 20px;
      background: #fff;
      min-height: 100vh;
      box-shadow: 0 0 0 1px #ddd;
    }

    h1 { text-align: center; margin-top: 40px; margin-bottom: 4px; }

    .balance {
      font-size: 3rem;
      font-weight: 700;
      text-align: center;
      margin: 6px 0 0;
    }

    .date {
      text-align: center;
      margin-top: 4px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: #666;
    }

    .separator-line {
      width: 240px;
      height: 1px;
      background: #222;
      margin: 8px auto 24px;
    }

    .section-title { font-weight: 600; margin-bottom: 8px; }

    ul { list-style: none; padding: 0; margin: 0; }

    li {
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
    }

    .name { font-weight: 600; }
    .amount { float: right; font-weight: 600; }
  </style>
</head>

<body>
  <div class="container">

    <h1>Maintain Balance</h1>

    <div class="balance" id="total">$0.00</div>
    <div class="date" id="today"></div>

    <div class="separator-line"></div>

    <div class="section-title">Payments Due in Next 4 Days</div>

    <ul id="upcoming-list">
      <li>No payments detected in the next 4 days.</li>
    </ul>

  </div>

  <script src="app.js?v=9999"></script>
</body>
</html>
