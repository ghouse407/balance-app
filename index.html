<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maintain Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #222;
    }

    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 20px;
      background: #ffffff;
      min-height: 100vh;
      position: relative;
    }

    .settings-icon {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 1.6rem;
    }

    .settings-icon a {
      color: inherit;
      text-decoration: none;
    }

    h1 {
      font-size: 1.4rem;
      margin-top: 40px;
      margin-bottom: 4px;
      text-align: center;
    }

    .balance {
      font-size: 3rem;
      font-weight: 700;
      margin: 6px 0 0;
      color: #000000;
      text-align: center;
    }

    .date {
      font-size: 0.9rem;
      color: #666;
      margin-top: 4px;
      margin-bottom: 16px;
      text-align: center;
    }

    .separator-line {
      width: 240px;
      height: 1px;
      background: #222;
      margin: 8px auto 24px;
      border-radius: 1px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 8px;
      text-align: left;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
      font-size: 0.95rem;
    }

    .name {
      font-weight: 600;
    }

    .amount {
      float: right;
      font-weight: 600;
    }

    .admin-panel {
      display: none;
    }

    .admin-panel.active {
      display: block;
    }

    .admin-section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 16px 0 8px;
    }

    input[type="file"] {
      margin: 8px 0 12px;
    }

    button {
      padding: 8px 12px;
      margin: 4px 4px 4px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button:hover {
      background: #eee;
    }

    pre {
      background: #eee;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      overflow-x: auto;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0d0d0d;
        color: #f2f2f2;
      }

      .container {
        background: #111;
      }

      h1, .section-title, .admin-section-title {
        color: #ffffff;
      }

      .balance {
        color: #ffffff;
      }

      .date {
        color: #bbbbbb;
      }

      .separator-line {
        background: #ffffff;
      }

      ul li {
        border-bottom: 1px solid #333;
        color: #e6e6e6;
      }

      pre {
        background: #1a1a1a;
        color: #e6e6e6;
        border: 1px solid #333;
      }

      button {
        background: #1a1a1a;
        color: #f2f2f2;
        border: 1px solid #444;
      }

      button:hover {
        background: #333;
      }

      input[type="file"] {
        color: #ddd;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="settings-icon">
      <a href="#admin">⚙️</a>
    </div>

    <!-- MAIN VIEW -->
    <div id="main-view">
      <h1>Maintain Balance</h1>

      <!-- FIXED: app.js expects id="total" -->
      <div class="balance" id="total">$0.00</div>

      <!-- FIXED: app.js expects id="today" -->
      <div class="date" id="today"></div>

      <div class="separator-line"></div>

      <div class="section-title">Payments Due in Next 4 Days</div>

      <ul id="upcoming-list">
        <li>No payments detected in the next 4 days.</li>
      </ul>
    </div>

    <!-- ADMIN VIEW -->
    <div id="admin-view" class="admin-panel">
      <h1>Admin Panel</h1>

      <div class="admin-section-title">1. Upload Last 6 Months CSV</div>
      <input type="file" id="csv-input" accept=".csv" />
      <button id="process-csv-btn">Process CSV & Rebuild Backend</button>

      <div class="admin-section-title">2. Backend Controls</div>
      <button id="export-backend-btn">Export Backend (JSON)</button>
      <button id="reset-backend-btn">Reset Backend (Clear Local)</button>

      <div class="admin-section-title">3. Detected Recurring Payments</div>
      <pre id="backend-preview">No backend loaded yet.</pre>

      <div style="margin-top:20px; text-align:center;">
        <a href="#" style="color:#888; text-decoration:none;">Back to main screen</a>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
