<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maintain Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #000000;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 10px;
      font-size: 24px;
      font-weight: bold;
    }

    .balance {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      margin-top: 5px;
      color: #000000;
    }

    .date {
      text-align: center;
      margin-top: 5px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #444444;
    }

    .separator-line {
      width: 200px;
      height: 1px;
      background: #000000;
      margin: 10px auto 20px;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 10px 0;
      border-bottom: 1px solid #cccccc;
      font-size: 14px;
    }

    .name {
      font-weight: bold;
    }

    .amount {
      float: right;
      font-weight: bold;
      color: #000000;
    }

    .meta {
      font-size: 0.8rem;
      color: #777;
      display: block;
      margin-top: 2px;
    }

    /* DARK MODE */
    @media (prefers-color-scheme: dark) {
      body { background: #000000; color: #ffffff; }
      .balance { color: #ffffff; }
      .date { color: #cccccc; }
      .separator-line { background: #ffffff; }
      li { border-bottom: 1px solid #444444; }
      .amount { color: #ffffff; }
      .meta { color: #aaaaaa; }
    }

    /* ADMIN BUTTON */
    #admin-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      font-size: 22px;
      cursor: pointer;
      user-select: none;
    }

    /* ADMIN SCREEN */
    #admin-screen {
      display: none;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    #admin-screen h2 {
      margin-top: 40px;
      text-align: center;
    }

    /* SEGMENTED TOGGLE */
    #day-toggle {
      width: 220px;
      margin: 10px auto 20px;
      display: flex;
      border: 1px solid #888;
      border-radius: 8px;
      overflow: hidden;
      font-size: 14px;
    }

    .segment {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      cursor: pointer;
      background: #e6e6e6;
      color: #000;
    }

    .segment.active {
      background: #007aff;
      color: #fff;
      font-weight: bold;
    }

    @media (prefers-color-scheme: dark) {
      #day-toggle { border-color: #666; }
      .segment { background: #333; color: #ccc; }
      .segment.active { background: #0a84ff; color: #fff; }
    }
  </style>
</head>

<body>

  <div id="admin-btn">⚙️</div>

  <div id="main-screen" class="container">

    <h1>Maintain Balance</h1>

    <!-- SEGMENTED TOGGLE -->
    <div id="day-toggle">
      <div id="toggle-4" class="segment active">4 Days</div>
      <div id="toggle-30" class="segment">30 Days</div>
    </div>

    <div class="balance" id="total">$0.00</div>
    <div class="date" id="today"></div>

    <div class="separator-line"></div>

    <div class="section-title">Payments Due</div>

    <ul id="upcoming-list">
      <li>No payments detected.</li>
    </ul>

  </div>

  <div id="admin-screen">
    <h2>Admin Panel</h2>

    <p>Upload transactions CSV</p>
    <input type="file" id="csv-input" accept=".csv" />

    <br><br>
    <button id="back-btn">Back</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
