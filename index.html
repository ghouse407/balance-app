<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintain Balance</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    :root {
      --bg: #ffffff;
      --text: #000000;
      --card: #f2f2f2;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --text: #ffffff;
        --card: #1e1e1e;
      }
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    #today {
      font-size: 14px;
      opacity: 0.7;
    }

    .toggle-container {
      display: flex;
      justify-content: center;
      margin: 15px 0;
      gap: 10px;
    }

    .toggle-button {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #ccc;
      cursor: pointer;
      background: transparent;
      color: var(--text);
      transition: 0.2s;
    }

    .toggle-button.active {
      background-color: white;
      color: black;
      border: 1px solid #999;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0 20px;
    }

    li {
      background: var(--card);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
    }

    .amount {
      float: right;
      font-weight: bold;
    }

    .meta {
      font-size: 12px;
      opacity: 0.7;
    }

    #total-container {
      text-align: center;
      margin: 20px 0;
      font-size: 20px;
      font-weight: bold;
    }

    #admin-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #444;
      color: white;
      cursor: pointer;
    }

    #admin-screen {
      display: none;
      padding: 20px;
    }

    #back-btn {
      padding: 10px 14px;
      background: #444;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
      display: inline-block;
    }
  </style>
</head>

<body>
  <!-- MAIN SCREEN -->
  <div id="main-screen">
    <header>
      Maintain Balance
      <div id="today"></div>
    </header>

    <div class="toggle-container">
      <div id="toggle-4" class="toggle-button active">4 Days</div>
      <div id="toggle-30" class="toggle-button">30 Days</div>
    </div>

    <ul id="upcoming-list"></ul>

    <div id="total-container">
      Total: <span id="total">$0.00</span>
    </div>

    <div id="admin-btn">Admin</div>
  </div>

  <!-- ADMIN SCREEN -->
  <div id="admin-screen">
    <div id="back-btn">← Back</div>
    <h2>Admin Panel</h2>
    <p>Future admin tools will appear here.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
